name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-npm:
    runs-on: ubuntu-latest
    needs: [ci]

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Check if the version has a pre-release suffix (anything after a hyphen)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(.+))$ ]]; then
            SUFFIX="${BASH_REMATCH[2]}"
            echo "prerelease=true" >> $GITHUB_OUTPUT
            # Extract the label part (letters only) from the suffix; fall back to "next"
            LABEL=$(echo "$SUFFIX" | sed 's/[^a-zA-Z].*//')
            if [[ -z "$LABEL" ]]; then
              LABEL="next"
            fi
            echo "npm_tag=$LABEL" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Update package.json version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance --tag ${{ steps.version.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version update to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Find the branch that contains this tag
          BRANCH=$(git branch -r --contains "$GITHUB_REF_NAME" | grep -v '\->' | head -1 | sed 's/origin\///' | tr -d ' ')
          if [[ -z "$BRANCH" ]]; then
            BRANCH="main"
          fi
          echo "Target branch: $BRANCH"

          git checkout "$BRANCH"
          git add package.json
          git commit -m "chore: update version to ${{ steps.version.outputs.version }}"
          git push origin "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
